syntax = "proto3";

package example;

option go_package = "github.com/bramAristyo/learn-microservice/grpc-playground;example";

service GreeterService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse) {}
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message = 1;
}
